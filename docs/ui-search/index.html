<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Búsqueda UI - Security Edge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Búsqueda de UI</h1>
    <div class="controls">
      <input id="q" placeholder="Buscar texto o ruta de archivo" />
      <input id="tag" placeholder="Filtrar por etiqueta (p. ej. login, botón)" />
      <button id="clear">Limpiar</button>
    </div>
    <div id="results"></div>
    <footer>Ejecuta <code>npm run build-ui-index</code> para regenerar <code>ui-index.json</code>.</footer>
  </div>
  <script src="ui-search.js"></script>
</body>
</html>
