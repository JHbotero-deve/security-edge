name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Levantar servicios (PostgreSQL)
        run: docker-compose up -d

      - name: Esperar a que la base de datos esté lista
        run: |
          echo "Esperando a que Postgres inicie..."
          # Un pequeño script para esperar a que el puerto 5432 acepte conexiones
          for i in {1..10}; do
            if nc -z localhost 5432; then
              echo "Postgres listo!"
              break
            fi
            sleep 3
          done

      - name: Ejecutar pruebas
        run: |
          # Aquí iría el comando para ejecutar tus tests
          # Ejemplo: npm install && npm test
          echo "Ejecutando pruebas..."

          